<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>股票涨停统计分析系统</title>
  </head>
  <body>
    <div id="app"></div>
    <script>
      ;(function () {
        function loadTdxLegacyFallback() {
          if (!/^\/tdx([\/]|$)/.test(window.location.pathname)) return
          if (window.__TDX_VUE_MOUNTED__) return
          var app = document.getElementById('app')
          if (!app) return
          var visibleText = (document.body && document.body.innerText ? document.body.innerText : '').replace(/\s+/g, '')
          if (app.children.length > 0 && visibleText.length > 4) return
          if (window.__TDX_LEGACY_FALLBACK_LOADING__) return
          window.__TDX_LEGACY_FALLBACK_LOADING__ = true
          var script = document.createElement('script')
          script.src = '/tdx-legacy.js?t=' + Date.now()
          script.onload = function () {
            if (window.loadTdxLegacyFallback) window.loadTdxLegacyFallback()
          }
          document.head.appendChild(script)
        }

        window.setTimeout(loadTdxLegacyFallback, 2200)
      })()
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
